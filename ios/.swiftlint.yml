# SwiftLint Configuration for StayMonitor (iOS)
# https://realm.github.io/SwiftLint/rule-directory.html

excluded:
  - .build
  - .swiftpm
  - "**/*.generated.swift"

# --- Opt-in Rules ---
opt_in_rules:
  # 可読性
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - prohibited_super_call
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

  # 安全性
  - discarded_notification_center_observer
  - force_unwrapping
  - implicitly_unwrapped_optional
  - lower_acl_than_parent
  - private_outlet
  - strong_iboutlet

disabled_rules:
  # --- SwiftFormatに委ねるルール（フォーマット系） ---
  # 原則: 見た目の整形はSwiftFormat、ロジック/安全性はSwiftLint
  - trailing_comma        # SwiftFormat trailingCommas が trailing comma を管理
  - opening_brace         # SwiftFormat braces が波括弧の配置を管理
  - modifier_order        # SwiftFormat modifierOrder が修飾子順序を管理
  - trailing_whitespace   # SwiftFormat trailingSpace が末尾空白を管理
  - vertical_whitespace   # SwiftFormat consecutiveBlankLines が連続空行を管理
  - colon                 # SwiftFormat spaceAroundOperators がコロン前後を管理
  - void_return           # SwiftFormat void が Void/() の統一を管理
  - comma                 # SwiftFormat spaceAroundOperators がカンマ後スペースを管理
  - prefer_self_in_static_references  # SwiftFormat redundantStaticSelf と競合
  - redundant_nil_coalescing  # Double?? → Double? のフラットニング等で誤検知する

# force_unwrapping は warning に下げる（URL/NotificationNameリテラル等で安全な使用が多い）
force_unwrapping:
  severity: warning

# --- Rule Configuration ---

# 関数の長さ: 50行で警告、80行でエラー
function_body_length:
  warning: 50
  error: 80

# 1行の長さ: 120文字で警告、200文字でエラー
line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: false
  ignores_interpolated_strings: true

# 型の長さ
type_body_length:
  warning: 300
  error: 500

# ファイルの長さ
file_length:
  warning: 600
  error: 1000

# 型名
type_name:
  min_length: 3
  max_length: 50

# 識別子名
identifier_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - ok
    - to
    - db
    - op

# ネストの深さ
nesting:
  type_level: 3
  function_level: 4

# サイクロマティック複雑度
cyclomatic_complexity:
  warning: 10
  error: 15

# 関数のパラメータ数
function_parameter_count:
  warning: 5
  error: 8

# 大きいtupleの制限
large_tuple:
  warning: 3
  error: 4

# enum case associated values
enum_case_associated_values_count:
  warning: 5
  error: 7

# --- Custom Rules (ハーネスエンジニアリング) ---
# AIエージェントの出力品質を機械的に強制するルール群
# エラーメッセージに修正方法と参照先を埋め込み、AIへのコンテキスト注入として機能させる
custom_rules:
  # 並行処理: ロック機構禁止 → actorを使え
  no_lock_primitives:
    regex: 'NSLock\b|NSRecursiveLock\b|os_unfair_lock\b'
    message: "ロック機構は禁止。actorを使用せよ。参照: .claude/rules/BEST_PRACTICES.md の並行処理セクション"
    severity: error

  # 並行処理: DispatchQueue禁止 → Swift Concurrencyを使え
  no_dispatch_queue:
    regex: 'DispatchQueue\b'
    message: "DispatchQueueは禁止。Swift Concurrency (actor/Task/async-await) を使用せよ。参照: .claude/rules/BEST_PRACTICES.md"
    severity: error

  # トップレベル関数禁止 → 最低でもenumでnamespaceをつけろ
  no_top_level_function:
    regex: '^func\s+'
    message: "トップレベル関数は禁止。最低でもenumでnamespaceをつけろ（例: enum Calc { static func ... }）。参照: .claude/rules/BEST_PRACTICES.md"
    severity: error
